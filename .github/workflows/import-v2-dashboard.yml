name: Import OurCFO v2 dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-v2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Import deployed v2 assets
        run: |
          set -euo pipefail
          base="https://wooer-home-wealth-dashboard.vercel.app"
          mkdir -p utils scripts
          curl -fsSL "$base/" -o index.html
          curl -fsSL "$base/styles.css" -o styles.css
          curl -fsSL "$base/app.js" -o app.js
          curl -fsSL "$base/utils/finance.js" -o utils/finance.js
          python3 <<'PY'
          from pathlib import Path

          Path('scripts/build-static.cjs').write_text('''const fs = require("node:fs/promises");
const path = require("node:path");

const root = path.resolve(__dirname, "..");
const output = path.join(root, "public");
const staticFiles = ["index.html", "styles.css", "app.js"];
const staticDirs = ["utils"];

async function build() {
  await fs.rm(output, { recursive: true, force: true });
  await fs.mkdir(output, { recursive: true });

  await Promise.all(
    staticFiles.map((file) => fs.copyFile(path.join(root, file), path.join(output, file)))
  );
  await Promise.all(
    staticDirs.map((dir) => fs.cp(path.join(root, dir), path.join(output, dir), { recursive: true }))
  );

  console.log(`OurCFO static build ready: ${staticFiles.length} files and ${staticDirs.length} directories copied to public/`);
}

build().catch((error) => {
  console.error(error);
  process.exit(1);
});
