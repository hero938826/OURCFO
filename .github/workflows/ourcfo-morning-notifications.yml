name: OurCFO morning notifications

on:
  workflow_dispatch:

concurrency:
  group: ourcfo-morning-notifications
  cancel-in-progress: false

jobs:
  send-due-morning-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Send due Telegram morning notifications
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OURCFO_INITIAL_DATA_BASE64: ${{ secrets.OURCFO_INITIAL_DATA_BASE64 }}
        run: node scripts/github-action-runner.cjs morning-notifications
