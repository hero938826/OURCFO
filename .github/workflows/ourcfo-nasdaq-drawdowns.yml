name: OurCFO Nasdaq-100 drawdowns

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

concurrency:
  group: ourcfo-nasdaq-drawdowns
  cancel-in-progress: true

jobs:
  send-nasdaq-drawdowns:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Send Telegram Nasdaq-100 drawdown report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/github-action-runner.cjs nasdaq-drawdowns
