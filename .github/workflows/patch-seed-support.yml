name: Patch seed support

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch API seed-file support
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('api/_data.js')
          text = path.read_text(encoding='utf-8')

          if 'const fs = require("node:fs");' not in text:
              text = 'const fs = require("node:fs");\nconst path = require("node:path");\n\n' + text

          text = text.replace(
              'if (process.env.OURCFO_INITIAL_DATA || process.env.OURCFO_INITIAL_DATA_BASE64) return "seed";',
              'if (process.env.OURCFO_INITIAL_DATA || process.env.OURCFO_INITIAL_DATA_BASE64 || seedFilePath()) return "seed";'
          )

          old = '''function loadSeedState() {
  const base64 = process.env.OURCFO_INITIAL_DATA_BASE64;
  const raw = base64 ? Buffer.from(base64, "base64").toString("utf8") : process.env.OURCFO_INITIAL_DATA;
  if (!raw) return DEFAULT_STATE;

  try {
    return JSON.parse(raw);
  } catch (error) {
    throw new Error("OURCFO_INITIAL_DATA is not valid JSON");
  }
}
'''
          new = '''function loadSeedState() {
  const base64 = process.env.OURCFO_INITIAL_DATA_BASE64;
  const raw = base64 ? Buffer.from(base64, "base64").toString("utf8") : process.env.OURCFO_INITIAL_DATA;

  if (raw) {
    try {
      return JSON.parse(raw);
    } catch (error) {
      const fileState = loadSeedFile();
      if (fileState) return fileState;
      throw new Error("OURCFO_INITIAL_DATA is not valid JSON");
    }
  }

  return loadSeedFile() || DEFAULT_STATE;
}

function seedFilePath() {
  const candidates = [
    process.env.OURCFO_SEED_FILE,
    path.join(__dirname, "..", "data", "ourcfo-seed.json")
  ].filter(Boolean);

  return candidates.find((candidate) => fs.existsSync(candidate));
}

function loadSeedFile() {
  const filePath = seedFilePath();
  if (!filePath) return null;

  try {
    return JSON.parse(fs.readFileSync(filePath, "utf8"));
  } catch (error) {
    throw new Error("OurCFO seed file is not valid JSON");
  }
}
'''
          if old not in text:
              raise SystemExit('Expected loadSeedState block not found')
          text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Remove temporary workflow
        run: rm -f .github/workflows/patch-seed-support.yml
      - name: Commit patch
        run: |
          git config user.name "codex-ourcfo-bot"
          git config user.email "codex-ourcfo-bot@users.noreply.github.com"
          git add api/_data.js .github/workflows/patch-seed-support.yml
          git commit -m "Support private OurCFO seed file" || exit 0
          git push
